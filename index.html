<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="theme-color" content="#2C5F2E" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="MóveisStudio" />
  <title>MóveisStudio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { background: #F2EDE8; font-family: 'Georgia', serif; }
    #root { max-width: 480px; margin: 0 auto; min-height: 100vh; }
    @keyframes pulse-red    { 0%,100%{box-shadow:0 0 0 0 rgba(220,38,38,.4)}  60%{box-shadow:0 0 0 8px rgba(220,38,38,0)} }
    @keyframes pulse-orange { 0%,100%{box-shadow:0 0 0 0 rgba(217,119,6,.4)}  60%{box-shadow:0 0 0 8px rgba(217,119,6,0)} }
    @keyframes slideUp   { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
    @keyframes slideDown { from{opacity:0;transform:translateY(-8px)}  to{opacity:1;transform:translateY(0)} }
    @keyframes spin      { to{transform:rotate(360deg)} }
    .pulse-red    { animation: pulse-red    2s ease-in-out infinite; }
    .pulse-orange { animation: pulse-orange 2s ease-in-out infinite; }
    .card-in      { animation: slideUp  .25s ease; }
    .alert-in     { animation: slideDown .3s  ease; }
    input, select, textarea {
      background:#fff; border:2px solid #D5C9BF; color:#1C1410;
      padding:12px 14px; font-size:15px; width:100%; outline:none;
      font-family:'DM Sans',sans-serif; border-radius:10px; transition:border .2s;
      -webkit-appearance:none; appearance:none;
    }
    input:focus, select:focus, textarea:focus { border-color:#2C5F2E; box-shadow:0 0 0 3px rgba(44,95,46,.12); }
    ::-webkit-scrollbar { width:4px; }
    ::-webkit-scrollbar-thumb { background:#C8A97A; border-radius:2px; }
    .fab {
      position:fixed; bottom:24px; right:50%; transform:translateX(calc(50% + 208px));
      width:56px; height:56px; border-radius:50%; background:#2C5F2E; color:#fff;
      border:none; font-size:28px; cursor:pointer; display:flex; align-items:center;
      justify-content:center; box-shadow:0 6px 20px rgba(44,95,46,.5); transition:all .2s; z-index:50;
    }
    .fab:active { background:#1E4020; transform:translateX(calc(50% + 208px)) scale(.95); }
    .tab-btn {
      flex:1; padding:10px 0; border:none; background:transparent; cursor:pointer;
      font-family:'DM Sans',sans-serif; font-size:13px; font-weight:600;
      color:#9C8B7D; border-bottom:3px solid transparent; transition:all .2s;
    }
    .tab-btn.active { color:#2C5F2E; border-bottom-color:#2C5F2E; }
    .chip {
      display:inline-flex; align-items:center; gap:4px; padding:7px 14px;
      border-radius:20px; border:2px solid #D5C9BF; background:#fff; cursor:pointer;
      font-size:12px; font-family:'DM Sans',sans-serif; font-weight:600; color:#6B5744;
      transition:all .2s; white-space:nowrap;
    }
    .chip.active { background:#2C5F2E; color:#fff; border-color:#2C5F2E; }
    .btn-green {
      background:#2C5F2E; color:#fff; border:none; border-radius:12px;
      padding:15px; font-size:15px; font-weight:700; cursor:pointer;
      font-family:'DM Sans',sans-serif; transition:all .2s; width:100%;
      display:flex; align-items:center; justify-content:center; gap:8px;
    }
    .btn-green:active { background:#1E4020; transform:scale(.98); }
    .btn-red {
      background:#fff; color:#DC2626; border:2px solid #DC2626; border-radius:12px;
      padding:13px; font-size:14px; font-weight:700; cursor:pointer;
      font-family:'DM Sans',sans-serif; transition:all .2s; flex:1;
      display:flex; align-items:center; justify-content:center; gap:6px;
    }
    .btn-red:active { background:#FEF2F2; }
    .btn-blue {
      background:#fff; color:#1D4ED8; border:2px solid #1D4ED8; border-radius:12px;
      padding:13px; font-size:14px; font-weight:700; cursor:pointer;
      font-family:'DM Sans',sans-serif; transition:all .2s; flex:1;
      display:flex; align-items:center; justify-content:center; gap:6px;
    }
    .btn-blue:active { background:#EFF6FF; }
    .btn-outline {
      background:#fff; color:#2C5F2E; border:2px solid #2C5F2E; border-radius:12px;
      padding:13px; font-size:14px; font-weight:700; cursor:pointer;
      font-family:'DM Sans',sans-serif; transition:all .2s; flex:1;
      display:flex; align-items:center; justify-content:center; gap:6px;
    }
    .btn-outline:active { background:#F0F7F0; }
    .section-label {
      font-size:10px; color:#9C8B7D; letter-spacing:1.8px;
      text-transform:uppercase; font-family:'DM Sans',sans-serif; font-weight:700; margin-bottom:6px;
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    const COMISSAO_PCT = 0.05;
    const STORAGE_KEY  = "moveis-studio-v2";
    const META_KEY     = "moveis-studio-meta";

    const STATUS = {
      em_projeto:           { label:"Em Projeto",    icon:"✏️", color:"#92400E", bg:"#FEF3C7", border:"#F59E0B" },
      na_fabrica:           { label:"Na Fábrica",     icon:"🏭", color:"#065F46", bg:"#D1FAE5", border:"#10B981" },
      aguardando_pagamento: { label:"Ag. Pagamento",  icon:"💰", color:"#991B1B", bg:"#FEE2E2", border:"#EF4444" },
      concluido:            { label:"Concluído",      icon:"✅", color:"#1E3A5F", bg:"#DBEAFE", border:"#3B82F6" },
    };

    const PRAZO = (prazo) => {
      const d = Math.ceil((new Date(prazo) - new Date()) / 86400000);
      if (d < 0)   return { d, icon:"🚨", label:`${Math.abs(d)}d atrasado`, color:"#fff",    bg:"#DC2626", border:"#991B1B", pulse:"red"    };
      if (d === 0) return { d, icon:"🔴", label:"Vence HOJE",               color:"#fff",    bg:"#DC2626", border:"#991B1B", pulse:"red"    };
      if (d <= 3)  return { d, icon:"🟠", label:`${d}d restantes`,          color:"#fff",    bg:"#D97706", border:"#B45309", pulse:"orange" };
      if (d <= 7)  return { d, icon:"🟡", label:`${d}d restantes`,          color:"#92400E", bg:"#FEF3C7", border:"#F59E0B", pulse:null     };
      if (d <= 14) return { d, icon:"🟢", label:`${d}d restantes`,          color:"#065F46", bg:"#D1FAE5", border:"#10B981", pulse:null     };
      return              { d, icon:"📅", label:`${d}d restantes`,          color:"#374151", bg:"#F3F4F6", border:"#D1D5DB", pulse:null     };
    };

    const R$ = (v) => Number(v).toLocaleString("pt-BR", { style:"currency", currency:"BRL" });
    const DD = (s) => { if (!s) return "—"; const [y,m,d] = s.split("-"); return `${d}/${m}/${y}`; };
    const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2);
    const FORM0 = { nome:"", cliente:"", contato:"", valor:"", pago:"", prazo:"", status:"em_projeto", descricao:"" };

    const Badge = ({ st }) => (
      <span style={{ display:"inline-flex", alignItems:"center", gap:4, padding:"3px 10px",
        borderRadius:20, fontSize:11, fontWeight:700, fontFamily:"'DM Sans',sans-serif",
        background:st.bg, color:st.color, border:`1.5px solid ${st.border}` }}>
        {st.icon} {st.label}
      </span>
    );

    const PrazoBadge = ({ prazo, large }) => {
      const p = PRAZO(prazo);
      return (
        <span className={p.pulse === "red" ? "pulse-red" : p.pulse === "orange" ? "pulse-orange" : ""}
          style={{ display:"inline-flex", alignItems:"center", gap:4,
            padding: large ? "5px 14px" : "3px 10px",
            borderRadius:20, fontSize: large ? 13 : 11, fontWeight:700,
            fontFamily:"'DM Sans',sans-serif", background:p.bg, color:p.color,
            border:`1.5px solid ${p.border}`, whiteSpace:"nowrap" }}>
          {p.icon} {p.label}
        </span>
      );
    };

    const ProgressBar = ({ pct, color }) => (
      <div style={{ height:6, background:"#E5E7EB", borderRadius:3, overflow:"hidden" }}>
        <div style={{ height:"100%", width:`${Math.min(pct,100)}%`,
          background: color || (pct>=100 ? "#10B981" : "#2C5F2E"),
          borderRadius:3, transition:"width .5s ease" }} />
      </div>
    );

    function App() {
      const [projects,  setProjects]  = useState([]);
      const [loading,   setLoading]   = useState(true);
      const [saving,    setSaving]    = useState(false);
      const [view,      setView]      = useState("lista");
      const [filter,    setFilter]    = useState("todos");
      const [activeId,  setActiveId]  = useState(null);
      const [form,      setForm]      = useState(FORM0);
      const [editId,    setEditId]    = useState(null);
      const [dismissed, setDismissed] = useState([]);
      const [tab,       setTab]       = useState("ativos");
      const [meta,      setMeta]      = useState(0);
      const [metaInput, setMetaInput] = useState("");
      const [metaEdit,  setMetaEdit]  = useState(false);
      const [anoRelatorio, setAnoRelatorio] = useState(new Date().getFullYear());

      // localStorage para persistência real na web
      useEffect(() => {
        try {
          const r = localStorage.getItem(STORAGE_KEY);
          if (r) setProjects(JSON.parse(r));
          const m = localStorage.getItem(META_KEY);
          if (m) setMeta(parseFloat(m) || 0);
        } catch (_) {}
        setLoading(false);
      }, []);

      const persist = useCallback((list) => {
        setSaving(true);
        setProjects(list);
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(list)); } catch (_) {}
        setTimeout(() => setSaving(false), 400);
      }, []);

      const saveMeta = (val) => {
        const v = parseFloat(val) || 0;
        setMeta(v);
        setMetaEdit(false);
        try { localStorage.setItem(META_KEY, String(v)); } catch (_) {}
      };

      const ativos     = projects.filter(p => p.status !== "concluido");
      const concluidos = projects.filter(p => p.status === "concluido");
      const lista      = tab === "ativos" ? ativos : concluidos;
      const filtered   = filter === "todos" ? lista : lista.filter(p => p.status === filter);
      const sorted     = [...filtered].sort((a,b) => PRAZO(a.prazo).d - PRAZO(b.prazo).d);

      const totalVendas   = ativos.reduce((s,p) => s + p.valor, 0);
      const totalRecebido = ativos.reduce((s,p) => s + p.pago,  0);
      const comissaoTotal = totalVendas   * COMISSAO_PCT;
      const comissaoPaga  = totalRecebido * COMISSAO_PCT;
      const pctComissao   = comissaoTotal > 0 ? Math.round((comissaoPaga / comissaoTotal) * 100) : 0;

      const comissaoConcluidos     = concluidos.reduce((s,p) => s + p.valor, 0) * COMISSAO_PCT;
      const comissaoParciaisAtivos = ativos.reduce((s,p) => s + p.pago, 0) * COMISSAO_PCT;
      const comissaoParaMeta       = comissaoConcluidos + comissaoParciaisAtivos;
      const pctMeta      = meta > 0 ? Math.min(Math.round((comissaoParaMeta / meta) * 100), 100) : 0;
      const metaRestante = meta > 0 ? Math.max(meta - comissaoParaMeta, 0) : 0;
      const metaAtingida = meta > 0 && comissaoParaMeta >= meta;

      const MESES = ["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
      const dadosMensais = MESES.map((mes, idx) => {
        const doConcl = concluidos.filter(p => { if (!p.prazo) return false; const d = new Date(p.prazo); return d.getFullYear()===anoRelatorio && d.getMonth()===idx; });
        const doAtiv  = ativos.filter(p => { if (!p.prazo) return false; const d = new Date(p.prazo); return d.getFullYear()===anoRelatorio && d.getMonth()===idx; });
        const comissaoConcl = doConcl.reduce((s,p) => s + p.valor * COMISSAO_PCT, 0);
        const comissaoAtiv  = doAtiv.reduce((s,p)  => s + p.pago  * COMISSAO_PCT, 0);
        const total = comissaoConcl + comissaoAtiv;
        return { mes, idx, total, comissaoConcl, comissaoAtiv, projetos: doConcl.length + doAtiv.length };
      });
      const maxMensal = Math.max(...dadosMensais.map(d => d.total), 1);
      const totalAno  = dadosMensais.reduce((s,d) => s + d.total, 0);
      const melhorMes = dadosMensais.reduce((a,b) => b.total > a.total ? b : a, dadosMensais[0]);

      const criticos = ativos.filter(p => PRAZO(p.prazo).pulse && !dismissed.includes(p.id));
      const activeProject = projects.find(p => p.id === activeId);

      const openNew    = () => { setEditId(null); setForm(FORM0); setView("form"); };
      const openEdit   = (p) => { setEditId(p.id); setForm({...p, valor:String(p.valor), pago:String(p.pago)}); setView("form"); };
      const openDetail = (id) => { setActiveId(id); setView("detalhe"); };
      const goBack     = () => { setView("lista"); setActiveId(null); };

      const saveForm = () => {
        if (!form.nome.trim() || !form.cliente.trim() || !form.prazo) return;
        const data = { ...form, id: editId || uid(), valor: parseFloat(form.valor)||0, pago: parseFloat(form.pago)||0 };
        const updated = editId ? projects.map(p => p.id===editId ? data : p) : [...projects, data];
        persist(updated); goBack();
      };
      const remove   = (id) => { persist(projects.filter(p => p.id !== id)); goBack(); };
      const concluir = (id) => { persist(projects.map(p => p.id===id ? {...p, status:"concluido"} : p)); goBack(); };
      const reabrir  = (id) => { persist(projects.map(p => p.id===id ? {...p, status:"em_projeto"} : p)); };
      const ff = (key) => (e) => setForm(f => ({...f, [key]: e.target.value}));

      if (loading) return (
        <div style={{ minHeight:"100vh", background:"#F5F0EB", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", gap:12 }}>
          <div style={{ fontSize:44 }}>🪵</div>
          <div style={{ fontFamily:"'DM Sans',sans-serif", color:"#6B5744", fontSize:15 }}>Carregando projetos...</div>
        </div>
      );

      return (
        <div style={{ minHeight:"100vh", background:"#F2EDE8", color:"#1C1410", position:"relative" }}>

          {/* ── LISTA ── */}
          {view === "lista" && (
            <div style={{ paddingBottom:90 }}>
              <div style={{ background:"#fff", padding:"16px 20px 0", boxShadow:"0 2px 8px rgba(0,0,0,.06)" }}>
                <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:14 }}>
                  <div style={{ display:"flex", alignItems:"center", gap:10 }}>
                    <div style={{ width:38, height:38, background:"#2C5F2E", borderRadius:10, display:"flex", alignItems:"center", justifyContent:"center", fontSize:18 }}>🪵</div>
                    <div>
                      <div style={{ fontFamily:"'Playfair Display',serif", fontSize:20, fontWeight:900, lineHeight:1.1 }}>Móveis<span style={{ color:"#2C5F2E" }}>Studio</span></div>
                      <div style={{ fontSize:10, color:"#9C8B7D", letterSpacing:"2px", textTransform:"uppercase", fontFamily:"'DM Sans',sans-serif" }}>Gestão de Projetos</div>
                    </div>
                  </div>
                  <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                    {saving && <div style={{ width:16, height:16, border:"2px solid #D5C9BF", borderTopColor:"#2C5F2E", borderRadius:"50%", animation:"spin .6s linear infinite" }} />}
                    {criticos.length > 0 && !saving && (
                      <div style={{ background:"#DC2626", color:"#fff", borderRadius:20, padding:"4px 12px", fontSize:12, fontWeight:700, fontFamily:"'DM Sans',sans-serif" }}>🚨 {criticos.length}</div>
                    )}
                  </div>
                </div>
                <div style={{ display:"flex", borderBottom:"1px solid #EDE8E3" }}>
                  {[["ativos",`Ativos (${ativos.length})`],["concluidos",`Concluídos (${concluidos.length})`]].map(([k,l]) => (
                    <button key={k} className={`tab-btn ${tab===k?"active":""}`} onClick={() => { setTab(k); setFilter("todos"); }}>{l}</button>
                  ))}
                </div>
              </div>

              {tab === "ativos" && criticos.map(p => {
                const info = PRAZO(p.prazo);
                return (
                  <div key={p.id} className="alert-in" style={{ margin:"10px 16px 0", background: info.pulse==="red"?"#FEE2E2":"#FEF3C7", border:`1.5px solid ${info.border}`, borderRadius:12, padding:"10px 14px", display:"flex", alignItems:"center", gap:10 }}>
                    <span style={{ fontSize:20, flexShrink:0 }}>{info.icon}</span>
                    <div style={{ flex:1, minWidth:0 }}>
                      <div style={{ fontFamily:"'DM Sans',sans-serif", fontWeight:700, fontSize:13, color: info.pulse==="red"?"#991B1B":"#92400E", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{p.nome}</div>
                      <div style={{ fontFamily:"'DM Sans',sans-serif", fontSize:12, color: info.pulse==="red"?"#B91C1C":"#B45309" }}>{info.label} · {p.cliente}</div>
                    </div>
                    <div style={{ display:"flex", gap:6, flexShrink:0 }}>
                      <button onClick={() => openDetail(p.id)} style={{ background: info.pulse==="red"?"#DC2626":"#D97706", color:"#fff", border:"none", borderRadius:8, padding:"5px 10px", fontSize:12, fontWeight:700, cursor:"pointer", fontFamily:"'DM Sans',sans-serif" }}>Ver</button>
                      <button onClick={() => setDismissed(d=>[...d,p.id])} style={{ background:"transparent", border:"none", fontSize:18, cursor:"pointer", color:"#9C8B7D", lineHeight:1, padding:"0 2px" }}>✕</button>
                    </div>
                  </div>
                );
              })}

              {tab === "ativos" && (
                <div style={{ margin:"14px 16px 0" }}>
                  {/* Comissão */}
                  <div style={{ background:"linear-gradient(135deg,#FFFBF0,#FEF3C7)", border:"2px solid #F59E0B", borderRadius:14, padding:"16px" }}>
                    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:10 }}>
                      <div>
                        <div className="section-label" style={{ color:"#B45309" }}>💰 Minha Comissão — 5%</div>
                        <div style={{ fontFamily:"'Playfair Display',serif", fontSize:26, fontWeight:900, color:"#92400E", lineHeight:1.1 }}>{R$(comissaoTotal)}</div>
                        <div style={{ fontSize:11, color:"#B45309", fontFamily:"'DM Sans',sans-serif", marginTop:2 }}>sobre {R$(totalVendas)}</div>
                      </div>
                      <div style={{ background:"#fff", borderRadius:10, padding:"10px 12px", border:"1.5px solid #FCD34D", textAlign:"right", minWidth:110 }}>
                        <div style={{ fontSize:10, color:"#065F46", fontWeight:700, fontFamily:"'DM Sans',sans-serif", textTransform:"uppercase", letterSpacing:"1px" }}>✅ Garantida</div>
                        <div style={{ fontFamily:"'Playfair Display',serif", fontSize:17, fontWeight:700, color:"#065F46" }}>{R$(comissaoPaga)}</div>
                        <div style={{ fontSize:11, color:"#DC2626", fontFamily:"'DM Sans',sans-serif" }}>falta {R$(comissaoTotal-comissaoPaga)}</div>
                      </div>
                    </div>
                    <ProgressBar pct={pctComissao} color="linear-gradient(90deg,#D97706,#F59E0B)" />
                    <div style={{ fontSize:11, color:"#B45309", fontFamily:"'DM Sans',sans-serif", marginTop:5, fontWeight:600 }}>{pctComissao}% garantida</div>
                  </div>

                  {/* Meta */}
                  <div style={{ background: metaAtingida?"linear-gradient(135deg,#ECFDF5,#D1FAE5)":"linear-gradient(135deg,#EFF6FF,#DBEAFE)", border:`2px solid ${metaAtingida?"#10B981":"#3B82F6"}`, borderRadius:14, padding:"14px 16px", marginTop:10 }}>
                    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom: meta > 0 ? 10 : 0 }}>
                      <div>
                        <div className="section-label" style={{ color: metaAtingida?"#065F46":"#1D4ED8" }}>🎯 Meta de Comissão</div>
                        {meta > 0
                          ? <div style={{ fontFamily:"'Playfair Display',serif", fontSize:24, fontWeight:900, color: metaAtingida?"#065F46":"#1D4ED8", lineHeight:1.1 }}>{R$(meta)}</div>
                          : <div style={{ fontFamily:"'DM Sans',sans-serif", fontSize:13, color:"#6B7280", marginTop:2 }}>Nenhuma meta definida</div>
                        }
                      </div>
                      {!metaEdit
                        ? <button onClick={() => { setMetaInput(meta>0?String(meta):""); setMetaEdit(true); }}
                            style={{ background: metaAtingida?"#10B981":"#2563EB", color:"#fff", border:"none", borderRadius:10, padding:"8px 14px", fontSize:13, fontWeight:700, cursor:"pointer", fontFamily:"'DM Sans',sans-serif" }}>
                            {meta > 0 ? "✏️ Editar" : "＋ Definir"}
                          </button>
                        : <div style={{ display:"flex", gap:6, alignItems:"center" }}>
                            <input type="number" inputMode="decimal" value={metaInput} onChange={e => setMetaInput(e.target.value)}
                              placeholder="Ex: 5000"
                              style={{ width:110, padding:"8px 10px", fontSize:14, borderRadius:8, border:"2px solid #3B82F6", background:"#fff", fontFamily:"'DM Sans',sans-serif", outline:"none" }}
                              autoFocus onKeyDown={e => e.key==="Enter" && saveMeta(metaInput)} />
                            <button onClick={() => saveMeta(metaInput)} style={{ background:"#2563EB", color:"#fff", border:"none", borderRadius:8, padding:"8px 12px", fontSize:13, fontWeight:700, cursor:"pointer", fontFamily:"'DM Sans',sans-serif" }}>✓</button>
                            <button onClick={() => setMetaEdit(false)} style={{ background:"#F3F4F6", color:"#6B7280", border:"none", borderRadius:8, padding:"8px 10px", fontSize:13, cursor:"pointer", fontFamily:"'DM Sans',sans-serif" }}>✕</button>
                          </div>
                      }
                    </div>
                    {meta > 0 && (
                      <>
                        {metaAtingida && <div style={{ background:"#10B981", borderRadius:10, padding:"8px 14px", marginBottom:10, textAlign:"center", fontFamily:"'DM Sans',sans-serif", fontWeight:700, fontSize:14, color:"#fff" }}>🏆 Meta atingida! Parabéns!</div>}

                          </div>
                          <div style={{ width:"100%", display:"flex", alignItems:"flex-end", height:120 }}>
                            <div style={{ width:"100%", height: h > 0 ? h : 3, background: isMelhor?"linear-gradient(180deg,#F59E0B,#D97706)":mesAtual?"linear-gradient(180deg,#3B82F6,#2563EB)":h>0?"linear-gradient(180deg,#4ADE80,#2C5F2E)":"#F3F4F6", borderRadius:"4px 4px 2px 2px", transition:"height .4s ease", border: mesAtual?"2px solid #1D4ED8":isMelhor?"2px solid #D97706":"none" }} />
                          </div>
                        </div>
                      );
                    })}
                  </div>
                  <div style={{ display:"flex", gap:4 }}>
                    {dadosMensais.map((d) => {
                      const mesAtual = new Date().getMonth() === d.idx && new Date().getFullYear() === anoRelatorio;
                      return <div key={d.mes} style={{ flex:1, textAlign:"center", fontSize:9, fontFamily:"'DM Sans',sans-serif", fontWeight: mesAtual?700:500, color: mesAtual?"#2563EB":"#9C8B7D" }}>{d.mes}</div>;
                    })}
                  </div>
                  <div style={{ display:"flex", gap:12, marginTop:12, fontFamily:"'DM Sans',sans-serif", fontSize:11, color:"#6B7280", flexWrap:"wrap" }}>
                    <span><span style={{ display:"inline-block", width:10, height:10, background:"#2C5F2E", borderRadius:2, marginRight:4 }} />Normal</span>
                    <span><span style={{ display:"inline-block", width:10, height:10, background:"#2563EB", borderRadius:2, marginRight:4 }} />Mês atual</span>
                    <span><span style={{ display:"inline-block", width:10, height:10, background:"#D97706", borderRadius:2, marginRight:4 }} />Melhor mês</span>
                  </div>
                </div>
                <div style={{ background:"#fff", border:"1px solid #E5DDD5", borderRadius:14, overflow:"hidden" }}>
                  <div style={{ padding:"14px 16px", borderBottom:"1px solid #F3F4F6" }}><div className="section-label">Detalhamento Mensal</div></div>
                  {dadosMensais.map((d, i) => {
                    const mesAtual = new Date().getMonth() === d.idx && new Date().getFullYear() === anoRelatorio;
                    const isMelhor = d.total > 0 && d.total === melhorMes.total;
                    const pctDoAno = totalAno > 0 ? Math.round((d.total / totalAno) * 100) : 0;
                    return (
                      <div key={d.mes} style={{ padding:"12px 16px", borderBottom: i<11?"1px solid #F9F7F5":"none", background: mesAtual?"#EFF6FF":"transparent", display:"flex", alignItems:"center", gap:12 }}>
                        <div style={{ width:36, textAlign:"center" }}>
                          <div style={{ fontFamily:"'DM Sans',sans-serif", fontWeight:700, fontSize:13, color: mesAtual?"#2563EB":isMelhor?"#D97706":"#374151" }}>{d.mes}</div>
                          {isMelhor && <div style={{ fontSize:9, color:"#D97706", fontWeight:700 }}>🏆</div>}
                          {mesAtual && <div style={{ fontSize:9, color:"#2563EB", fontWeight:700 }}>ATUAL</div>}
                        </div>
                        <div style={{ flex:1 }}>
                          {d.total > 0
                            ? <>
                                <div style={{ height:6, background:"#F3F4F6", borderRadius:3, overflow:"hidden", marginBottom:4 }}>
                                  <div style={{ height:"100%", width:`${pctDoAno}%`, background: isMelhor?"linear-gradient(90deg,#F59E0B,#D97706)":mesAtual?"linear-gradient(90deg,#3B82F6,#2563EB)":"linear-gradient(90deg,#4ADE80,#2C5F2E)", borderRadius:3 }} />
                                </div>
                                <div style={{ display:"flex", gap:8, fontFamily:"'DM Sans',sans-serif", fontSize:10, color:"#9C8B7D" }}>
                                  {d.comissaoConcl > 0 && <span>✅ {R$(d.comissaoConcl)}</span>}
                                  {d.comissaoAtiv  > 0 && <span>⏳ {R$(d.comissaoAtiv)}</span>}
                                  <span>{d.projetos} projeto{d.projetos!==1?"s":""}</span>
                                </div>
                              </>
                            : <div style={{ fontFamily:"'DM Sans',sans-serif", fontSize:12, color:"#D1D5DB" }}>Sem projetos</div>
                          }
                        </div>
                        <div style={{ textAlign:"right", minWidth:70 }}>
                          <div style={{ fontFamily:"'Playfair Display',serif", fontSize:15, fontWeight:700, color: d.total>0?(isMelhor?"#D97706":"#1C1410"):"#D1D5DB" }}>{d.total > 0 ? R$(d.total) : "—"}</div>
                          {d.total > 0 && <div style={{ fontFamily:"'DM Sans',sans-serif", fontSize:10, color:"#9C8B7D" }}>{pctDoAno}% do ano</div>}
                        </div>
                      </div>
                    );
                  })}
                  <div style={{ padding:"14px 16px", background:"#F9F7F5", borderTop:"2px solid #E5DDD5", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                    <div style={{ fontFamily:"'DM Sans',sans-serif", fontWeight:700, fontSize:14, color:"#374151" }}>Total {anoRelatorio}</div>
                    <div style={{ fontFamily:"'Playfair Display',serif", fontSize:18, fontWeight:900, color:"#92400E" }}>{R$(totalAno)}</div>
                  </div>
                </div>
              </div>
            </div>
          )}

          {view === "lista" && tab === "ativos" && (
            <button className="fab" onClick={openNew}>＋</button>
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
