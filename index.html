      apiKey:"AIzaSyCcKRWMbbSsHJM25v9whNeNNIaLEYja_lQ",

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>

  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    html,body{background:#F2EDE8;font-family:'Georgia',serif}
    #root{max-width:480px;margin:0 auto;min-height:100vh}
    @keyframes pulse-red{0%,100%{box-shadow:0 0 0 0 rgba(220,38,38,.4)}60%{box-shadow:0 0 0 8px rgba(220,38,38,0)}}
    @keyframes pulse-orange{0%,100%{box-shadow:0 0 0 0 rgba(217,119,6,.4)}60%{box-shadow:0 0 0 8px rgba(217,119,6,0)}}
    @keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    @keyframes slideDown{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes fadeIn{from{opacity:0}to{opacity:1}}
    .pulse-red{animation:pulse-red 2s ease-in-out infinite}
    .pulse-orange{animation:pulse-orange 2s ease-in-out infinite}
    .card-in{animation:slideUp .25s ease}
    .alert-in{animation:slideDown .3s ease}
    input,select,textarea{background:#fff;border:2px solid #D5C9BF;color:#1C1410;padding:12px 14px;font-size:15px;width:100%;outline:none;font-family:'DM Sans',sans-serif;border-radius:10px;transition:border .2s;-webkit-appearance:none;appearance:none}
    input:focus,select:focus,textarea:focus{border-color:#2C5F2E;box-shadow:0 0 0 3px rgba(44,95,46,.12)}
    ::-webkit-scrollbar{width:4px}
    ::-webkit-scrollbar-thumb{background:#C8A97A;border-radius:2px}
    .fab{position:fixed;bottom:24px;right:50%;transform:translateX(calc(50% + 208px));width:56px;height:56px;border-radius:50%;background:#2C5F2E;color:#fff;border:none;font-size:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 6px 20px rgba(44,95,46,.5);transition:all .2s;z-index:50}
    .fab:active{background:#1E4020;transform:translateX(calc(50% + 208px)) scale(.95)}
    .tab-btn{flex:1;padding:10px 0;border:none;background:transparent;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;color:#9C8B7D;border-bottom:3px solid transparent;transition:all .2s}
    .tab-btn.active{color:#2C5F2E;border-bottom-color:#2C5F2E}
    .chip{display:inline-flex;align-items:center;gap:4px;padding:7px 14px;border-radius:20px;border:2px solid #D5C9BF;background:#fff;cursor:pointer;font-size:12px;font-family:'DM Sans',sans-serif;font-weight:600;color:#6B5744;transition:all .2s;white-space:nowrap}
    .chip.active{background:#2C5F2E;color:#fff;border-color:#2C5F2E}
    .btn-green{background:#2C5F2E;color:#fff;border:none;border-radius:12px;padding:15px;font-size:15px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;width:100%;display:flex;align-items:center;justify-content:center;gap:8px}
    .btn-green:active{background:#1E4020;transform:scale(.98)}
    .btn-red{background:#fff;color:#DC2626;border:2px solid #DC2626;border-radius:12px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;flex:1;display:flex;align-items:center;justify-content:center;gap:6px}
    .btn-red:active{background:#FEF2F2}
    .btn-blue{background:#fff;color:#1D4ED8;border:2px solid #1D4ED8;border-radius:12px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;flex:1;display:flex;align-items:center;justify-content:center;gap:6px}
    .btn-blue:active{background:#EFF6FF}
    .btn-outline{background:#fff;color:#2C5F2E;border:2px solid #2C5F2E;border-radius:12px;padding:13px;font-size:14px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;flex:1;display:flex;align-items:center;justify-content:center;gap:6px}
    .btn-outline:active{background:#F0F7F0}
    .section-label{font-size:10px;color:#9C8B7D;letter-spacing:1.8px;text-transform:uppercase;font-family:'DM Sans',sans-serif;font-weight:700;margin-bottom:6px}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useCallback, useRef } = React;
const COMISSAO_PCT = 0.05;
const ADMIN_EMAIL  = "agenciaindm@gmail.com";
const PIX_CHAVE    = "06981774950";
const PIX_NOME     = "MóveisStudio";
const PLANO_PRECO  = "R$ 5,00/mês";

const STATUS = {
  em_projeto:           {label:"Em Projeto",   icon:"✏️",color:"#92400E",bg:"#FEF3C7",border:"#F59E0B"},
  na_fabrica:           {label:"Na Fábrica",    icon:"🏭",color:"#065F46",bg:"#D1FAE5",border:"#10B981"},
  aguardando_pagamento: {label:"Ag. Pagamento", icon:"💰",color:"#991B1B",bg:"#FEE2E2",border:"#EF4444"},
  concluido:            {label:"Concluído",     icon:"✅",color:"#1E3A5F",bg:"#DBEAFE",border:"#3B82F6"},
};

const PRAZO = (prazo) => {
  const d = Math.ceil((new Date(prazo)-new Date())/86400000);
  if(d<0)   return{d,icon:"🚨",label:`${Math.abs(d)}d atrasado`,color:"#fff",   bg:"#DC2626",border:"#991B1B",pulse:"red"};
  if(d===0) return{d,icon:"🔴",label:"Vence HOJE",              color:"#fff",   bg:"#DC2626",border:"#991B1B",pulse:"red"};
  if(d<=3)  return{d,icon:"🟠",label:`${d}d restantes`,         color:"#fff",   bg:"#D97706",border:"#B45309",pulse:"orange"};
  if(d<=7)  return{d,icon:"🟡",label:`${d}d restantes`,         color:"#92400E",bg:"#FEF3C7",border:"#F59E0B",pulse:null};
  if(d<=14) return{d,icon:"🟢",label:`${d}d restantes`,         color:"#065F46",bg:"#D1FAE5",border:"#10B981",pulse:null};
  return          {d,icon:"📅",label:`${d}d restantes`,         color:"#374151",bg:"#F3F4F6",border:"#D1D5DB",pulse:null};
};

const R$ = (v)=>Number(v).toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
const DD  = (s)=>{if(!s)return"—";const[y,m,d]=s.split("-");return`${d}/${m}/${y}`;};
const uid = ()=>Date.now().toString(36)+Math.random().toString(36).slice(2);
const FORM0 = {nome:"",cliente:"",contato:"",valor:"",pago:"",prazo:"",status:"em_projeto",descricao:""};

const Spin = ()=><div style={{width:18,height:18,border:"2px solid rgba(255,255,255,.4)",borderTopColor:"#fff",borderRadius:"50%",animation:"spin .6s linear infinite",display:"inline-block"}}/>;
const Badge = ({st})=><span style={{display:"inline-flex",alignItems:"center",gap:4,padding:"3px 10px",borderRadius:20,fontSize:11,fontWeight:700,fontFamily:"'DM Sans',sans-serif",background:st.bg,color:st.color,border:`1.5px solid ${st.border}`}}>{st.icon} {st.label}</span>;
const PrazoBadge = ({prazo,large})=>{const p=PRAZO(prazo);return<span className={p.pulse==="red"?"pulse-red":p.pulse==="orange"?"pulse-orange":""} style={{display:"inline-flex",alignItems:"center",gap:4,padding:large?"5px 14px":"3px 10px",borderRadius:20,fontSize:large?13:11,fontWeight:700,fontFamily:"'DM Sans',sans-serif",background:p.bg,color:p.color,border:`1.5px solid ${p.border}`,whiteSpace:"nowrap"}}>{p.icon} {p.label}</span>;};
const ProgressBar = ({pct,color})=><div style={{height:6,background:"#E5E7EB",borderRadius:3,overflow:"hidden"}}><div style={{height:"100%",width:`${Math.min(pct,100)}%`,background:color||(pct>=100?"#10B981":"#2C5F2E"),borderRadius:3,transition:"width .5s ease"}}/></div>;

// ── Tela de planos / upgrade ──────────────────────────────────────────────────
function PlanosScreen({usuario, plano, onVoltar}) {
  const [copiado, setCopiado] = useState(false);
  const [enviado, setEnviado] = useState(false);

  const copiarPix = () => {
    if(navigator.clipboard) navigator.clipboard.writeText(PIX_CHAVE);
    setCopiado(true);
    setTimeout(()=>setCopiado(false),3000);
  };

  const avisarPagamento = async () => {
    try {
      await window.__db.collection("pagamentos_pendentes").add({
        uid: usuario.uid,
        email: usuario.email,
        nome: usuario.displayName||usuario.email,
        valor: 5,
        criadoEm: new Date().toISOString(),
        status: "aguardando"
      });
      setEnviado(true);
    } catch(_){}
  };

  return(
    <div style={{minHeight:"100vh",background:"#F2EDE8",paddingBottom:40}} className="card-in">
      <div style={{background:"#fff",padding:"16px 20px",display:"flex",alignItems:"center",gap:12,boxShadow:"0 2px 8px rgba(0,0,0,.06)"}}>
        <button onClick={onVoltar} style={{background:"#F2EDE8",border:"none",borderRadius:10,width:36,height:36,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",fontSize:18}}>←</button>
        <div style={{fontFamily:"'Playfair Display',serif",fontSize:18,fontWeight:700}}>Planos</div>
      </div>
      <div style={{padding:"20px 16px",display:"flex",flexDirection:"column",gap:16}}>

        {/* Plano Free */}
        <div style={{background:"#fff",border:`2px solid ${plano==="free"?"#2C5F2E":"#E5DDD5"}`,borderRadius:16,padding:"20px",position:"relative"}}>
          {plano==="free"&&<div style={{position:"absolute",top:-1,right:16,background:"#2C5F2E",color:"#fff",fontSize:10,fontWeight:700,fontFamily:"'DM Sans',sans-serif",padding:"3px 10px",borderRadius:"0 0 8px 8px",letterSpacing:"1px"}}>ATUAL</div>}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
            <div><div style={{fontFamily:"'Playfair Display',serif",fontSize:22,fontWeight:900}}>Free</div><div style={{fontFamily:"'DM Sans',sans-serif",fontSize:13,color:"#6B5744"}}>Para começar</div></div>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:28,fontWeight:900,color:"#2C5F2E"}}>R$ 0</div>
          </div>
          {[["✅","Até 2 projetos simultâneos"],["✅","Alertas de prazo"],["✅","Status dos projetos"],["✅","Relatório básico"],["❌","Meta de comissão"],["❌","Projetos ilimitados"],["❌","Relatório anual completo"]].map(([ic,txt],i)=>(
            <div key={i} style={{display:"flex",alignItems:"center",gap:8,marginBottom:6,fontFamily:"'DM Sans',sans-serif",fontSize:13,color:ic==="❌"?"#9C8B7D":"#1C1410"}}><span>{ic}</span>{txt}</div>
          ))}
        </div>

        {/* Plano Premium */}
        <div style={{background:"linear-gradient(135deg,#1E4020,#2C5F2E)",border:"2px solid #C8A97A",borderRadius:16,padding:"20px",position:"relative",overflow:"hidden"}}>
          {plano==="premium"&&<div style={{position:"absolute",top:-1,right:16,background:"#C8A97A",color:"#1E4020",fontSize:10,fontWeight:700,fontFamily:"'DM Sans',sans-serif",padding:"3px 10px",borderRadius:"0 0 8px 8px",letterSpacing:"1px"}}>ATUAL</div>}
          <div style={{position:"absolute",top:-20,right:-20,width:100,height:100,background:"rgba(200,169,122,.1)",borderRadius:"50%"}}/>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
            <div><div style={{fontFamily:"'Playfair Display',serif",fontSize:22,fontWeight:900,color:"#fff"}}>Premium ⭐</div><div style={{fontFamily:"'DM Sans',sans-serif",fontSize:13,color:"#C8A97A"}}>Tudo ilimitado</div></div>
            <div style={{textAlign:"right"}}><div style={{fontFamily:"'Playfair Display',serif",fontSize:28,fontWeight:900,color:"#C8A97A"}}>R$ 5</div><div style={{fontFamily:"'DM Sans',sans-serif",fontSize:11,color:"rgba(255,255,255,.6)"}}>/mês</div></div>
          </div>
          {[["✅","Projetos ilimitados"],["✅","Meta de comissão"],["✅","Relatório anual completo"],["✅","Alertas de prazo"],["✅","Todos os recursos Free"],["✅","Suporte prioritário"]].map(([ic,txt],i)=>(
            <div key={i} style={{display:"flex",alignItems:"center",gap:8,marginBottom:6,fontFamily:"'DM Sans',sans-serif",fontSize:13,color:"#fff"}}><span>{ic}</span>{txt}</div>
          ))}
        </div>

        {/* Pagamento via Pix */}
        {plano!=="premium" && (
          <div style={{background:"#fff",border:"2px solid #E5DDD5",borderRadius:16,padding:"20px"}}>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:18,fontWeight:700,marginBottom:4}}>Assinar Premium</div>
            <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:13,color:"#6B5744",marginBottom:16}}>Pague R$ 5,00 via Pix e avise — liberamos em minutos!</div>

            <div style={{background:"#F9F7F5",borderRadius:12,padding:"14px",marginBottom:12,textAlign:"center"}}>
              <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:11,color:"#9C8B7D",marginBottom:6,letterSpacing:"1px",textTransform:"uppercase",fontWeight:700}}>Chave Pix (CPF)</div>
              <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:20,fontWeight:700,color:"#1C1410",letterSpacing:"2px",marginBottom:10}}>069.817.749-50</div>
              <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:12,color:"#6B5744",marginBottom:12}}>👤 {PIX_NOME} · Valor: <strong>R$ 5,00</strong></div>
              <button onClick={copiarPix} style={{background:copiado?"#2C5F2E":"#1C1410",color:"#fff",border:"none",borderRadius:10,padding:"10px 20px",fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",width:"100%",transition:"all .2s"}}>
                {copiado?"✅ Chave copiada!":"📋 Copiar chave Pix"}
              </button>
            </div>

            {!enviado?(
              <button onClick={avisarPagamento} className="btn-green">
                ✅ Já paguei — avisar administrador
              </button>
            ):(
              <div style={{background:"#D1FAE5",border:"2px solid #10B981",borderRadius:12,padding:"14px",textAlign:"center"}}>
                <div style={{fontSize:24,marginBottom:6}}>🎉</div>
                <div style={{fontFamily:"'DM Sans',sans-serif",fontWeight:700,fontSize:14,color:"#065F46"}}>Aviso enviado!</div>
                <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:12,color:"#065F46",marginTop:4}}>Seu Premium será liberado em breve.</div>
              </div>
            )}
          </div>
        )}

        {plano==="premium"&&(
          <div style={{background:"linear-gradient(135deg,#ECFDF5,#D1FAE5)",border:"2px solid #10B981",borderRadius:12,padding:"14px",textAlign:"center"}}>
            <div style={{fontSize:28,marginBottom:6}}>⭐</div>
            <div style={{fontFamily:"'DM Sans',sans-serif",fontWeight:700,fontSize:15,color:"#065F46"}}>Você é Premium!</div>
            <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:12,color:"#065F46",marginTop:4}}>Aproveite todos os recursos ilimitados.</div>
          </div>
        )}
      </div>
    </div>
  );
}

// ── Painel Admin ──────────────────────────────────────────────────────────────
function AdminPanel({onVoltar}) {
  const [clientes, setClientes] = useState([]);
  const [pendentes, setPendentes] = useState([]);
  const [loading, setLoading] = useState(true);
  const [tab, setTab] = useState("pendentes");

  useEffect(()=>{
    const u1 = window.__db.collection("pagamentos_pendentes").where("status","==","aguardando").onSnapshot(snap=>{
      setPendentes(snap.docs.map(d=>({id:d.id,...d.data()})));
    });
    const u2 = window.__db.collection("users").onSnapshot(snap=>{
      setClientes(snap.docs.map(d=>({id:d.id,...d.data()})));
      setLoading(false);
    });
    return()=>{u1();u2();};
  },[]);

  const liberarPremium = async(p) => {
    try {
      await window.__db.collection("users").doc(p.uid).update({plano:"premium",planoAtualizadoEm:new Date().toISOString()});
      await window.__db.collection("pagamentos_pendentes").doc(p.id).update({status:"aprovado",aprovadoEm:new Date().toISOString()});
    } catch(e){ alert("Erro: "+e.message); }
  };

  const revogarPremium = async(uid) => {
    if(!window.confirm("Revogar Premium deste cliente?")) return;
    await window.__db.collection("users").doc(uid).update({plano:"free"});
  };

  const premiums = clientes.filter(c=>c.plano==="premium");
  const frees    = clientes.filter(c=>c.plano!=="premium");

  return(
    <div style={{minHeight:"100vh",background:"#F2EDE8",paddingBottom:40}} className="card-in">
      <div style={{background:"linear-gradient(135deg,#1E4020,#2C5F2E)",padding:"16px 20px",display:"flex",alignItems:"center",gap:12,boxShadow:"0 2px 8px rgba(0,0,0,.2)"}}>
        <button onClick={onVoltar} style={{background:"rgba(255,255,255,.15)",border:"none",borderRadius:10,width:36,height:36,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",fontSize:18,color:"#fff"}}>←</button>
        <div>
          <div style={{fontFamily:"'Playfair Display',serif",fontSize:18,fontWeight:700,color:"#fff"}}>Painel Admin</div>
          <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:11,color:"rgba(255,255,255,.7)"}}>MóveisStudio</div>
        </div>
        {pendentes.length>0&&<div style={{marginLeft:"auto",background:"#DC2626",color:"#fff",borderRadius:20,padding:"4px 12px",fontSize:12,fontWeight:700,fontFamily:"'DM Sans',sans-serif"}}>🔔 {pendentes.length}</div>}
      </div>

      {/* Stats */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,padding:"16px 16px 0"}}>
        {[{l:"Total",v:clientes.length,c:"#1C1410"},{l:"Premium ⭐",v:premiums.length,c:"#C8A97A"},{l:"Free",v:frees.length,c:"#2C5F2E"}].map((s,i)=>(
          <div key={i} style={{background:"#fff",borderRadius:12,padding:"12px 10px",textAlign:"center",border:"1px solid #E5DDD5"}}>
            <div className="section-label">{s.l}</div>
            <div style={{fontFamily:"'Playfair Display',serif",fontSize:22,fontWeight:900,color:s.c}}>{s.v}</div>
          </div>
        ))}
      </div>

      {/* Tabs */}
      <div style={{display:"flex",background:"#fff",margin:"16px 0 0",borderBottom:"1px solid #EDE8E3"}}>
        {[["pendentes",`🔔 Pendentes (${pendentes.length})`],["todos","👥 Clientes"],["premium","⭐ Premium"]].map(([k,l])=>(
          <button key={k} className={`tab-btn ${tab===k?"active":""}`} style={{fontSize:12,padding:"10px 4px"}} onClick={()=>setTab(k)}>{l}</button>
        ))}
      </div>

      <div style={{padding:"16px",display:"flex",flexDirection:"column",gap:10}}>
        {loading&&<div style={{textAlign:"center",padding:40,color:"#9C8B7D",fontFamily:"'DM Sans',sans-serif"}}>Carregando...</div>}

        {/* Pendentes */}
        {tab==="pendentes"&&(pendentes.length===0
          ?<div style={{textAlign:"center",padding:40}}><div style={{fontSize:40,marginBottom:8}}>✅</div><div style={{fontFamily:"'DM Sans',sans-serif",color:"#9C8B7D"}}>Nenhum pagamento pendente</div></div>
          :pendentes.map(p=>(
            <div key={p.id} style={{background:"#fff",borderRadius:14,padding:"14px 16px",border:"2px solid #F59E0B"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                <div><div style={{fontFamily:"'DM Sans',sans-serif",fontWeight:700,fontSize:14}}>{p.nome}</div><div style={{fontFamily:"'DM Sans',sans-serif",fontSize:12,color:"#6B5744"}}>{p.email}</div></div>
                <div style={{background:"#FEF3C7",borderRadius:8,padding:"4px 10px",fontFamily:"'DM Sans',sans-serif",fontSize:12,fontWeight:700,color:"#B45309"}}>R$ {p.valor},00</div>
              </div>
              <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:11,color:"#9C8B7D",marginBottom:10}}>📅 {new Date(p.criadoEm).toLocaleDateString("pt-BR")}</div>
              <button onClick={()=>liberarPremium(p)} className="btn-green" style={{fontSize:14}}>⭐ Liberar Premium</button>
            </div>
          ))
        )}

        {/* Todos os clientes */}
        {tab==="todos"&&clientes.map(c=>(
          <div key={c.id} style={{background:"#fff",borderRadius:14,padding:"14px 16px",border:"1px solid #E5DDD5",display:"flex",alignItems:"center",gap:12}}>
            <div style={{width:40,height:40,background:c.plano==="premium"?"linear-gradient(135deg,#1E4020,#2C5F2E)":"#F2EDE8",borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,flexShrink:0}}>{c.plano==="premium"?"⭐":"👤"}</div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontFamily:"'DM Sans',sans-serif",fontWeight:700,fontSize:14,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.nome||c.email}</div>
              <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:11,color:"#9C8B7D",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.email}</div>
            </div>
            <div style={{flexShrink:0}}>
              {c.plano==="premium"
                ?<button onClick={()=>revogarPremium(c.id)} style={{background:"#FEE2E2",color:"#DC2626",border:"none",borderRadius:8,padding:"6px 10px",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}}>Revogar</button>
                :<button onClick={()=>liberarPremium({uid:c.id,id:null})} style={{background:"#D1FAE5",color:"#065F46",border:"none",borderRadius:8,padding:"6px 10px",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}}>→ Premium</button>
              }
            </div>
          </div>
        ))}

        {/* Só Premium */}
        {tab==="premium"&&(premiums.length===0
          ?<div style={{textAlign:"center",padding:40}}><div style={{fontSize:40,marginBottom:8}}>⭐</div><div style={{fontFamily:"'DM Sans',sans-serif",color:"#9C8B7D"}}>Nenhum cliente Premium ainda</div></div>
          :premiums.map(c=>(
            <div key={c.id} style={{background:"linear-gradient(135deg,#1E4020,#2C5F2E)",borderRadius:14,padding:"14px 16px",display:"flex",alignItems:"center",gap:12}}>
              <div style={{width:40,height:40,background:"rgba(200,169,122,.2)",borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20,flexShrink:0}}>⭐</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontFamily:"'DM Sans',sans-serif",fontWeight:700,fontSize:14,color:"#fff",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.nome||c.email}</div>
                <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:11,color:"#C8A97A",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.email}</div>
              </div>
              <button onClick={()=>revogarPremium(c.id)} style={{background:"rgba(220,38,38,.2)",color:"#FCA5A5",border:"none",borderRadius:8,padding:"6px 10px",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",flexShrink:0}}>Revogar</button>
            </div>
          ))
        )}
      </div>
    </div>
  );
}

// ── Auth Screen ───────────────────────────────────────────────────────────────
function AuthScreen({onLogin}) {
  const [modo,setModo]=useState("login");
  const [nome,setNome]=useState("");
  const [email,setEmail]=useState("");
  const [senha,setSenha]=useState("");
  const [show,setShow]=useState(false);
  const [erro,setErro]=useState("");
  const [loading,setLoading]=useState(false);

  const handleLogin=async()=>{
    if(!email||!senha){setErro("Preencha e-mail e senha");return;}
    setLoading(true);setErro("");
    try{const c=await window.__auth.signInWithEmailAndPassword(email.trim(),senha);onLogin(c.user);}
    catch(e){setErro(e.code==="auth/wrong-password"||e.code==="auth/user-not-found"||e.code==="auth/invalid-credential"?"E-mail ou senha incorretos":"Erro ao entrar.");}
    setLoading(false);
  };

  const handleCadastro=async()=>{
    if(!nome||!email||!senha){setErro("Preencha todos os campos");return;}
    if(senha.length<6){setErro("Senha mínimo 6 caracteres");return;}
    setLoading(true);setErro("");
    try{
      const c=await window.__auth.createUserWithEmailAndPassword(email.trim(),senha);
      await c.user.updateProfile({displayName:nome.trim()});
      await window.__db.collection("users").doc(c.user.uid).set({nome:nome.trim(),email:email.trim(),projects:[],meta:0,plano:"free",criadoEm:new Date().toISOString()});
      onLogin(c.user);
    }catch(e){
      if(e.code==="auth/email-already-in-use")setErro("E-mail já cadastrado");
      else setErro("Erro ao cadastrar.");
    }
    setLoading(false);
  };

  return(
    <div style={{minHeight:"100vh",background:"linear-gradient(160deg,#1E4020 0%,#2C5F2E 50%,#3A7A3D 100%)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"24px"}}>
      <div style={{textAlign:"center",marginBottom:32}}>
        <div style={{width:90,height:90,background:"rgba(255,255,255,.12)",borderRadius:24,display:"flex",alignItems:"center",justifyContent:"center",fontSize:48,margin:"0 auto 16px",border:"2px solid rgba(200,169,122,.4)"}}>🏠</div>
        <div style={{fontFamily:"'Playfair Display',serif",fontSize:34,fontWeight:900,color:"#fff",lineHeight:1}}>Móveis<span style={{color:"#C8A97A"}}>Studio</span></div>
        <div style={{fontSize:12,color:"rgba(255,255,255,.6)",letterSpacing:"3px",textTransform:"uppercase",fontFamily:"'DM Sans',sans-serif",marginTop:6}}>Gestão de Projetos</div>
      </div>
      <div style={{background:"#fff",borderRadius:20,padding:"28px 24px",width:"100%",maxWidth:380,boxShadow:"0 20px 60px rgba(0,0,0,.3)"}}>
        <div style={{display:"flex",marginBottom:24,background:"#F9F7F5",borderRadius:12,padding:4}}>
          {[["login","Entrar"],["cadastro","Criar conta"]].map(([k,l])=>(
            <button key={k} onClick={()=>{setModo(k);setErro("");}} style={{flex:1,padding:"9px",border:"none",borderRadius:9,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",fontWeight:700,fontSize:14,background:modo===k?"#fff":"transparent",color:modo===k?"#2C5F2E":"#9C8B7D",boxShadow:modo===k?"0 1px 4px rgba(0,0,0,.1)":"none",transition:"all .2s"}}>{l}</button>
          ))}
        </div>
        {modo==="cadastro"&&<div style={{marginBottom:16}}><div className="section-label">Seu nome</div><input value={nome} onChange={e=>setNome(e.target.value)} placeholder="Como você se chama"/></div>}
        <div style={{marginBottom:16}}><div className="section-label">E-mail</div><input type="email" value={email} onChange={e=>setEmail(e.target.value)} placeholder="seu@email.com" autoCapitalize="none" onKeyDown={e=>e.key==="Enter"&&(modo==="login"?handleLogin():handleCadastro())}/></div>
        <div style={{marginBottom:16}}><div className="section-label">Senha</div>
          <div style={{position:"relative"}}>
            <input type={show?"text":"password"} value={senha} onChange={e=>setSenha(e.target.value)} placeholder="••••••••" style={{paddingRight:48}} onKeyDown={e=>e.key==="Enter"&&(modo==="login"?handleLogin():handleCadastro())}/>
            <button onClick={()=>setShow(s=>!s)} style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",fontSize:18,color:"#9C8B7D"}}>{show?"🙈":"👁️"}</button>
          </div>
        </div>
        {erro&&<div style={{background:"#FEE2E2",border:"1px solid #FCA5A5",borderRadius:8,padding:"10px 14px",marginBottom:12,fontFamily:"'DM Sans',sans-serif",fontSize:13,color:"#991B1B",textAlign:"center"}}>⚠️ {erro}</div>}
        <button className="btn-green" onClick={modo==="login"?handleLogin:handleCadastro} disabled={loading}>{loading?<Spin/>:modo==="login"?"🔐 Entrar":"✅ Criar conta grátis"}</button>
        <div style={{textAlign:"center",marginTop:14,fontFamily:"'DM Sans',sans-serif",fontSize:12,color:"#9C8B7D"}}>
          {modo==="login"?"Não tem conta? ":"Já tem conta? "}
          <button onClick={()=>{setModo(modo==="login"?"cadastro":"login");setErro("");}} style={{background:"none",border:"none",color:"#2C5F2E",fontWeight:700,cursor:"pointer",fontFamily:"'DM Sans',sans-serif",fontSize:12}}>{modo==="login"?"Criar conta grátis":"Entrar"}</button>
        </div>
      </div>
      <div style={{marginTop:20,fontFamily:"'DM Sans',sans-serif",fontSize:11,color:"rgba(255,255,255,.4)"}}>MóveisStudio © 2025</div>
    </div>
  );
}

// ── App Principal ─────────────────────────────────────────────────────────────
function App() {
  const [usuario,setUsuario]=useState(null);
  const [authReady,setAuthReady]=useState(false);
  const [plano,setPlano]=useState("free");
  const [projects,setProjects]=useState([]);
  const [saving,setSaving]=useState(false);
  const [view,setView]=useState("lista");
  const [filter,setFilter]=useState("todos");
  const [activeId,setActiveId]=useState(null);
  const [form,setForm]=useState(FORM0);
  const [editId,setEditId]=useState(null);
  const [dismissed,setDismissed]=useState([]);
  const [tab,setTab]=useState("ativos");
  const [meta,setMeta]=useState(0);
  const [metaInput,setMetaInput]=useState("");
  const [metaEdit,setMetaEdit]=useState(false);
  const [anoRel,setAnoRel]=useState(new Date().getFullYear());
  const unsubRef=useRef(null);
  const isAdmin = usuario?.email===ADMIN_EMAIL;
  const isPremium = plano==="premium" || isAdmin;

  useEffect(()=>{
    const unsub=window.__auth.onAuthStateChanged(user=>{
      if(user){setUsuario(user);loadUserData(user);}
      else{setUsuario(null);setProjects([]);setMeta(0);setPlano("free");}
      setAuthReady(true);
    });
    return()=>unsub();
  },[]);

  const loadUserData=(user)=>{
    if(unsubRef.current)unsubRef.current();
    unsubRef.current=window.__db.collection("users").doc(user.uid).onSnapshot(snap=>{
      if(snap.exists){const d=snap.data();setProjects(d.projects||[]);setMeta(d.meta||0);setPlano(d.plano||"free");}
    });
  };

  const persist=useCallback(async(list)=>{
    if(!usuario)return;
    // Free: max 2 projetos ativos
    if(!isPremium){
      const ativos=list.filter(p=>p.status!=="concluido");
      if(ativos.length>2){alert("Plano Free: máximo 2 projetos ativos.\nFaça upgrade para Premium! ⭐");return;}
    }
    setSaving(true);setProjects(list);
    try{await window.__db.collection("users").doc(usuario.uid).update({projects:list});}catch(_){}
    setSaving(false);
  },[usuario,isPremium]);

  const saveMeta=async(val)=>{
    if(!isPremium){setView("planos");return;}
    const v=parseFloat(val)||0;setMeta(v);setMetaEdit(false);
    if(!usuario)return;
    try{await window.__db.collection("users").doc(usuario.uid).update({meta:v});}catch(_){}
  };

  const handleLogout=async()=>{if(unsubRef.current)unsubRef.current();await window.__auth.signOut();setView("lista");};

  const ativos=projects.filter(p=>p.status!=="concluido");
  const concluidos=projects.filter(p=>p.status==="concluido");
  const lista=tab==="ativos"?ativos:concluidos;
  const filtered=filter==="todos"?lista:lista.filter(p=>p.status===filter);
  const sorted=[...filtered].sort((a,b)=>PRAZO(a.prazo).d-PRAZO(b.prazo).d);

  const totalVendas=ativos.reduce((s,p)=>s+p.valor,0);
  const totalRecebido=ativos.reduce((s,p)=>s+p.pago,0);
  const comissaoTotal=totalVendas*COMISSAO_PCT;
  const comissaoPaga=totalRecebido*COMISSAO_PCT;
  const pctComissao=comissaoTotal>0?Math.round((comissaoPaga/comissaoTotal)*100):0;
  const comissaoConcluidos=concluidos.reduce((s,p)=>s+p.valor,0)*COMISSAO_PCT;
  const comissaoParciaisAtivos=ativos.reduce((s,p)=>s+p.pago,0)*COMISSAO_PCT;
  const comissaoParaMeta=comissaoConcluidos+comissaoParciaisAtivos;
  const pctMeta=meta>0?Math.min(Math.round((comissaoParaMeta/meta)*100),100):0;
  const metaRestante=meta>0?Math.max(meta-comissaoParaMeta,0):0;
  const metaAtingida=meta>0&&comissaoParaMeta>=meta;

  const MESES=["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
  const dadosMensais=MESES.map((mes,idx)=>{
    const dC=concluidos.filter(p=>{if(!p.prazo)return false;const d=new Date(p.prazo);return d.getFullYear()===anoRel&&d.getMonth()===idx;});
    const dA=ativos.filter(p=>{if(!p.prazo)return false;const d=new Date(p.prazo);return d.getFullYear()===anoRel&&d.getMonth()===idx;});
    const cc=dC.reduce((s,p)=>s+p.valor*COMISSAO_PCT,0),ca=dA.reduce((s,p)=>s+p.pago*COMISSAO_PCT,0);
    return{mes,idx,total:cc+ca,comissaoConcl:cc,comissaoAtiv:ca,projetos:dC.length+dA.length};
  });
  const maxMensal=Math.max(...dadosMensais.map(d=>d.total),1);
  const totalAno=dadosMensais.reduce((s,d)=>s+d.total,0);
  const melhorMes=dadosMensais.reduce((a,b)=>b.total>a.total?b:a,dadosMensais[0]);
  const criticos=ativos.filter(p=>PRAZO(p.prazo).pulse&&!dismissed.includes(p.id));
  const activeProject=projects.find(p=>p.id===activeId);

  const openNew=()=>{
    if(!isPremium&&ativos.length>=2){setView("planos");return;}
    setEditId(null);setForm(FORM0);setView("form");
  };
  const openEdit=(p)=>{setEditId(p.id);setForm({...p,valor:String(p.valor),pago:String(p.pago)});setView("form");};
  const openDetail=(id)=>{setActiveId(id);setView("detalhe");};
  const goBack=()=>{setView("lista");setActiveId(null);};
  const saveForm=()=>{
    if(!form.nome.trim()||!form.cliente.trim()||!form.prazo)return;
    const data={...form,id:editId||uid(),valor:parseFloat(form.valor)||0,pago:parseFloat(form.pago)||0};
    persist(editId?projects.map(p=>p.id===editId?data:p):[...projects,data]);goBack();
  };
  const remove=(id)=>{persist(projects.filter(p=>p.id!==id));goBack();};
  const concluir=(id)=>{persist(projects.map(p=>p.id===id?{...p,status:"concluido"}:p));goBack();};
  const reabrir=(id)=>{persist(projects.map(p=>p.id===id?{...p,status:"em_projeto"}:p));};
  const ff=(key)=>(e)=>setForm(f=>({...f,[key]:e.target.value}));

  if(!authReady)return(
    <div style={{minHeight:"100vh",background:"#2C5F2E",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:12}}>
      <div style={{fontSize:48}}>🏠</div>
      <div style={{fontFamily:"'DM Sans',sans-serif",color:"rgba(255,255,255,.8)",fontSize:15}}>Carregando...</div>
    </div>
  );

  if(!usuario)return<AuthScreen onLogin={u=>{setUsuario(u);loadUserData(u);}}/>;
  if(view==="planos")return<PlanosScreen usuario={usuario} plano={plano} onVoltar={goBack}/>;
  if(view==="admin"&&isAdmin)return<AdminPanel onVoltar={goBack}/>;

  const nomeUsuario=usuario.displayName||usuario.email.split("@")[0];

  return(
    <div style={{minHeight:"100vh",background:"#F2EDE8",color:"#1C1410",position:"relative"}}>

      {view==="lista"&&(
        <div style={{paddingBottom:90}}>
          <div style={{background:"#fff",padding:"16px 20px 0",boxShadow:"0 2px 8px rgba(0,0,0,.06)"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
              <div style={{display:"flex",alignItems:"center",gap:10}}>
                <div style={{width:38,height:38,background:"#2C5F2E",borderRadius:10,display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>🏠</div>
                <div>
                  <div style={{fontFamily:"'Playfair Display',serif",fontSize:20,fontWeight:900,lineHeight:1.1}}>Móveis<span style={{color:"#2C5F2E"}}>Studio</span></div>
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <div style={{fontSize:10,color:"#9C8B7D",letterSpacing:"1.5px",textTransform:"uppercase",fontFamily:"'DM Sans',sans-serif"}}>👤 {nomeUsuario}</div>
                    {isPremium&&!isAdmin&&<span style={{background:"linear-gradient(135deg,#1E4020,#2C5F2E)",color:"#C8A97A",fontSize:9,fontWeight:700,padding:"2px 6px",borderRadius:6,fontFamily:"'DM Sans',sans-serif"}}>⭐ PREMIUM</span>}
                    {isAdmin&&<span style={{background:"#DC2626",color:"#fff",fontSize:9,fontWeight:700,padding:"2px 6px",borderRadius:6,fontFamily:"'DM Sans',sans-serif"}}>👑 ADMIN</span>}
                  </div>
                </div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                {saving&&<div style={{width:16,height:16,border:"2px solid #D5C9BF",borderTopColor:"#2C5F2E",borderRadius:"50%",animation:"spin .6s linear infinite"}}/>}
                {criticos.length>0&&!saving&&<div style={{background:"#DC2626",color:"#fff",borderRadius:20,padding:"4px 8px",fontSize:11,fontWeight:700,fontFamily:"'DM Sans',sans-serif"}}>🚨{criticos.length}</div>}
                {isAdmin&&<button onClick={()=>setView("admin")} style={{background:"#FEF3C7",border:"none",borderRadius:8,padding:"6px 8px",fontSize:12,fontWeight:700,color:"#B45309",cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}}>👑</button>}
                <button onClick={handleLogout} style={{background:"#FEE2E2",border:"none",borderRadius:8,padding:"6px 8px",fontSize:12,fontWeight:700,color:"#DC2626",cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}}>Sair</button>
              </div>
            </div>

            {/* Banner Free */}
            {!isPremium&&(
              <div style={{background:"linear-gradient(135deg,#1E4020,#2C5F2E)",borderRadius:"10px 10px 0 0",padding:"10px 14px",display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:0}}>
                <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:12,color:"#fff"}}><strong style={{color:"#C8A97A"}}>Free</strong> · {ativos.length}/2 projetos ativos</div>
                <button onClick={()=>setView("planos")} style={{background:"#C8A97A",color:"#1E4020",border:"none",borderRadius:8,padding:"5px 10px",fontSize:11,fontWeight:700,cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}}>⭐ Upgrade R$5/mês</button>
              </div>
            )}

            <div style={{display:"flex",borderBottom:"1px solid #EDE8E3"}}>
              {[["ativos",`Ativos (${ativos.length})`],["concluidos",`Concluídos (${concluidos.length})`]].map(([k,l])=>(
                <button key={k} className={`tab-btn ${tab===k?"active":""}`} onClick={()=>{setTab(k);setFilter("todos");}}>{l}</button>
              ))}
            </div>
          </div>

          {tab==="ativos"&&criticos.map(p=>{const info=PRAZO(p.prazo);return(
            <div key={p.id} className="alert-in" style={{margin:"10px 16px 0",background:info.pulse==="red"?"#FEE2E2":"#FEF3C7",border:`1.5px solid ${info.border}`,borderRadius:12,padding:"10px 14px",display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:20,flexShrink:0}}>{info.icon}</span>
              <div style={{flex:1,minWidth:0}}><div style={{fontFamily:"'DM Sans',sans-serif",fontWeight:700,fontSize:13,color:info.pulse==="red"?"#991B1B":"#92400E",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{p.nome}</div><div style={{fontFamily:"'DM Sans',sans-serif",fontSize:12,color:info.pulse==="red"?"#B91C1C":"#B45309"}}>{info.label} · {p.cliente}</div></div>
              <div style={{display:"flex",gap:6,flexShrink:0}}>
                <button onClick={()=>openDetail(p.id)} style={{background:info.pulse==="red"?"#DC2626":"#D97706",color:"#fff",border:"none",borderRadius:8,padding:"5px 10px",fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"'DM Sans',sans-serif"}}>Ver</button>
                <button onClick={()=>setDismissed(d=>[...d,p.id])} style={{background:"transparent",border:"none",fontSize:18,cursor:"pointer",color:"#9C8B7D",lineHeight:1,padding:"0 2px"}}>✕</button>
              </div>
            </div>
          );})}

          {tab==="ativos"&&(
            <div style={{margin:"14px 16px 0"}}>
              <div style={{background:"linear-gradient(135deg,#FFFBF0,#FEF3C7)",border:"2px solid #F59E0B",borderRadius:14,padding:"16px"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                  <div><div className="section-label" style={{color:"#B45309"}}>💰 Minha Comissão — 5%</div><div style={{fontFamily:"'Playfair Display',serif",fontSize:26,fontWeight:900,color:"#92400E",lineHeight:1.1}}>{R$(comissaoTotal)}</div><div style={{fontSize:11,color:"#B45309",fontFamily:"'DM Sans',sans-serif",marginTop:2}}>sobre {R$(totalVendas)}</div></div>
                  <div style={{background:"#fff",borderRadius:10,padding:"10px 12px",border:"1.5px solid #FCD34D",textAlign:"right",minWidth:110}}><div style={{fontSize:10,color:"#065F46",fontWeight:700,fontFamily:"'DM Sans',sans-serif",textTransform:"uppercase",letterSpacing:"1px"}}>✅ Garantida</div><div style={{fontFamily:"'Playfair Display',serif",fontSize:17,fontWeight:700,color:"#065F46"}}>{R$(comissaoPaga)}</div><div style={{fontSize:11,color:"#DC2626",fontFamily:"'DM Sans',sans-serif"}}>falta {R$(comissaoTotal-comissaoPaga)}</div></div>
                </div>
                <ProgressBar pct={pctComissao} color="linear-gradient(90deg,#D97706,#F59E0B)"/>
                <div style={{fontSize:11,color:"#B45309",fontFamily:"'DM Sans',sans-serif",marginTop:5,fontWeight:600}}>{pctComissao}% garantida</div>
              </div>

              {/* Meta — só Premium */}
              {isPremium?(
                <div style={{background:metaAtingida?"linear-gradient(135deg,#ECFDF5,#D1FAE5)":"linear-gradient(135deg,#EFF6FF,#DBEAFE)",border:`2px solid ${metaAtingida?"#10B981":"#3B82F6"}`,borderRadius:14,padding:"14px 16px",marginTop:10}}>

            <div style={{background:"#fff",border:"1px solid #E5DDD5",borderRadius:14,overflow:"hidden"}}>
              <div style={{padding:"14px 16px",borderBottom:"1px solid #F3F4F6"}}><div className="section-label">Detalhamento Mensal</div></div>
              {dadosMensais.map((d,i)=>{const mA=new Date().getMonth()===d.idx&&new Date().getFullYear()===anoRel,iM=d.total>0&&d.total===melhorMes.total,pY=totalAno>0?Math.round((d.total/totalAno)*100):0;return(<div key={d.mes} style={{padding:"12px 16px",borderBottom:i<11?"1px solid #F9F7F5":"none",background:mA?"#EFF6FF":"transparent",display:"flex",alignItems:"center",gap:12}}><div style={{width:36,textAlign:"center"}}><div style={{fontFamily:"'DM Sans',sans-serif",fontWeight:700,fontSize:13,color:mA?"#2563EB":iM?"#D97706":"#374151"}}>{d.mes}</div>{iM&&<div style={{fontSize:9,color:"#D97706",fontWeight:700}}>🏆</div>}{mA&&<div style={{fontSize:9,color:"#2563EB",fontWeight:700}}>ATUAL</div>}</div><div style={{flex:1}}>{d.total>0?<><div style={{height:6,background:"#F3F4F6",borderRadius:3,overflow:"hidden",marginBottom:4}}><div style={{height:"100%",width:`${pY}%`,background:iM?"linear-gradient(90deg,#F59E0B,#D97706)":mA?"linear-gradient(90deg,#3B82F6,#2563EB)":"linear-gradient(90deg,#4ADE80,#2C5F2E)",borderRadius:3}}/></div><div style={{display:"flex",gap:8,fontFamily:"'DM Sans',sans-serif",fontSize:10,color:"#9C8B7D"}}>{d.comissaoConcl>0&&<span>✅ {R$(d.comissaoConcl)}</span>}{d.comissaoAtiv>0&&<span>⏳ {R$(d.comissaoAtiv)}</span>}<span>{d.projetos} projeto{d.projetos!==1?"s":""}</span></div></>:<div style={{fontFamily:"'DM Sans',sans-serif",fontSize:12,color:"#D1D5DB"}}>Sem projetos</div>}</div><div style={{textAlign:"right",minWidth:70}}><div style={{fontFamily:"'Playfair Display',serif",fontSize:15,fontWeight:700,color:d.total>0?(iM?"#D97706":"#1C1410"):"#D1D5DB"}}>{d.total>0?R$(d.total):"—"}</div>{d.total>0&&<div style={{fontFamily:"'DM Sans',sans-serif",fontSize:10,color:"#9C8B7D"}}>{pY}% do ano</div>}</div></div>);})}
              <div style={{padding:"14px 16px",background:"#F9F7F5",borderTop:"2px solid #E5DDD5",display:"flex",justifyContent:"space-between",alignItems:"center"}}><div style={{fontFamily:"'DM Sans',sans-serif",fontWeight:700,fontSize:14,color:"#374151"}}>Total {anoRel}</div><div style={{fontFamily:"'Playfair Display',serif",fontSize:18,fontWeight:900,color:"#92400E"}}>{R$(totalAno)}</div></div>
            </div>
          </div>
        </div>
      )}

      {view==="lista"&&tab==="ativos"&&<button className="fab" onClick={openNew}>＋</button>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
